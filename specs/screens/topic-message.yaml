version: "2.0"

screen:
  name: 주제 기반 메시지
  route: (explorer 내 모달)
  layout: modal-center
  description: 소유자에게 관심 주제 태그가 붙은 메시지 전송

data_requirements:
  - resource: folder_tree
    needs: [id, name]
    filters: { type: "folder" }
    purpose: 키워드 태그 자동 추천용
  - resource: message
    needs: []
    purpose: 메시지 저장 대상

components:
  - id: keyword_tags
    type: tag-input
    position: modal-top
    function: 관련 키워드 태그 (현재 보고 있는 폴더/파일 기반 자동 추천, 수동 추가 가능)
    data_source:
      resource: folder_tree

  - id: message_body
    type: textarea
    position: modal-center
    function: 메시지 본문

  - id: sender_info
    type: form-group
    position: modal-bottom
    function: 발신자 정보
    fields:
      - name: sender_name
        type: text
        label: 이름/닉네임
        required: true
      - name: sender_email
        type: email
        label: 이메일 (답장받으려면)
        required: false

  - id: submit_button
    type: button
    position: modal-footer
    function: 메시지 전송

events:
  - trigger: 모달 오픈
    action: 현재 보고 있는 폴더/파일 이름을 키워드 태그에 자동 추가
  - trigger: 메시지 전송
    action: Supabase에 저장 → 소유자에게 이메일 알림 → 성공 토스트
  - trigger: 모달 닫기
    action: X 버튼 또는 외부 클릭

tests:
  - name: 자동 키워드 태그
    when: "건강/오토파지.md" 보는 중 메시지 FAB 클릭
    then: [모달 열림, "건강", "오토파지" 태그 자동 추가됨]
  - name: 메시지 전송
    when: 태그 [건강, 오토파지] + 본문 "간헐적 단식 경험 공유하고 싶습니다" + 이름 "민수" 제출
    then: [성공 토스트, 모달 닫힘]
  - name: 이름 필수
    when: 이름 없이 전송
    then: [에러 표시, 전송 안 됨]
